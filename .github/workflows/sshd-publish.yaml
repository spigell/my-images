name: Build and Publish OpenSSH Server
run-name: "${{ github.event.client_payload.message || (github.event_name == 'repository_dispatch' && format('{0}: repository_dispatch by {1}', github.event.action, github.actor)) || format('{0} by {1}', github.event_name, github.actor) }}"

on:
  repository_dispatch:
    types: [zmx-binary-updated, debug-sre-workbench-updated]
  push:
    branches-ignore:
      - 'renovate/**'
    paths:
      - 'sshd-docker/**'
      - '.github/workflows/sshd-publish.yaml'
  workflow_dispatch:
    inputs:
      zmx_tag:
        description: zmx binary tag (optional; falls back to GHCR latest)
        required: false
        type: string
      sre_toolset_tag:
        description: debug-sre-workbench tag (optional; falls back to GHCR latest)
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  resolve-zmx-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.final-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/resolve-ghcr-tag
        id: final-tag
        with:
          owner: ${{ github.repository_owner }}
          image: zmx-binary
          payload_tag: ${{ github.event.client_payload.zmx_tag }}
          input_tag: ${{ inputs.zmx_tag }}
          ghcr_token: ${{ secrets.IMAGES_PUBLISH_TOKEN }}

  resolve-sre-toolset-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.final-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/resolve-ghcr-tag
        id: final-tag
        with:
          owner: ${{ github.repository_owner }}
          image: debug-sre-workbench
          payload_tag: ${{ github.event.client_payload.debug_sre_tag }}
          input_tag: ${{ inputs.sre_toolset_tag }}
          ghcr_token: ${{ secrets.IMAGES_PUBLISH_TOKEN }}

  build-sshd-workbench:
    needs:
      - resolve-zmx-tag
      - resolve-sre-toolset-tag
    uses: spigell/my-shared-workflows/.github/workflows/docker-build-release.yaml@main
    secrets:
      gh-token: ${{ secrets.IMAGES_PUBLISH_TOKEN }}
    with:
      image-name: openssh-server
      context: ./sshd-docker
      version: ${{ github.sha }}
      build-args: |
        ZMX_BINARY_IMAGE_TAG=${{ needs.resolve-zmx-tag.outputs.tag }}
        SRE_TOOLSET_IMAGE_TAG=${{ needs.resolve-sre-toolset-tag.outputs.tag }}
      build-contexts: |
        shared=./shared

  trigger-downstreams:
    needs:
      - build-sshd-workbench
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch SSHD Workbench Update
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.IMAGES_PUBLISH_TOKEN }}
          event-type: sshd-workbench-updated
          client-payload: '{"sshd_tag":"${{ needs.build-sshd-workbench.outputs.sha-tag }}"}'
