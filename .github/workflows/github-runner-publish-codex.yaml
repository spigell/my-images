name: Build and Publish GitHub Runner image (Codex AI agent)
run-name: "${{ github.event.client_payload.message || (github.event_name == 'repository_dispatch' && format('{0}: repository_dispatch by {1}', github.event.action, github.actor)) || format('{0} by {1}', github.event_name, github.actor) }}"

on:
  repository_dispatch:
    types: [openai-codex-workbench-updated]
  push:
    branches-ignore:
      - 'renovate/**'
    paths:
      - 'github-runner-docker/**'
      - '.github/workflows/github-runner-publish-codex.yaml'
  workflow_dispatch:
    inputs:
      codex_tag:
        description: Codex Workbench tag to consume (optional; falls back to GHCR latest)
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  runner_version: '2.335.1' # renovate: datasource=github-releases depName=actions/runner

jobs:
  resolve-base-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.final-tag.outputs.tag }}
      runner_version: ${{ steps.version-config.outputs.runner_version }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/resolve-ghcr-tag
        id: final-tag
        with:
          owner: ${{ github.repository_owner }}
          image: codex-workbench
          payload_tag: ${{ github.event.client_payload.codex_tag }}
          input_tag: ${{ inputs.codex_tag }}
          ghcr_token: ${{ secrets.IMAGES_PUBLISH_TOKEN }}
      - id: version-config
        run: echo "runner_version=${{ env.runner_version }}" >> "$GITHUB_OUTPUT"

  build-github-runner:
    needs:
      - resolve-base-tag
    uses: spigell/my-shared-workflows/.github/workflows/docker-build-release.yaml@main
    secrets:
      gh-token: ${{ secrets.IMAGES_PUBLISH_TOKEN }}
    with:
      image-name: codex-github-runner
      context: ./github-runner-docker
      version: ${{ needs.resolve-base-tag.outputs.runner_version }}
      build-args: |
        BASE_IMAGE_NAME=codex-workbench
        BASE_IMAGE_TAG=${{ needs.resolve-base-tag.outputs.tag }}
        RUNNER_VERSION=${{ needs.resolve-base-tag.outputs.runner_version }}
      build-contexts: |
        shared=./shared
